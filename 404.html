<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>الصفحة غير موجودة — Digital Syria Store</title>
<meta name="theme-color" content="#0B0A10">
<link rel="icon" type="image/svg+xml" href="/assets/logo-icon.svg">
<link rel="apple-touch-icon" href="/assets/logo-icon.svg">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;800;900&family=Tajawal:wght@400;500;700&display=swap" rel="stylesheet">
<style>
  :root{
    --bg:#0E0D0F; --card:#1C1A1D; --neon-blue:#00D4FF; --neon-purple:#8B5CF6;
    --text:#F2EFE9; --text-dim:#ADA9A4; --hairline:rgba(242,239,233,0.08);
  }
  *{box-sizing:border-box; margin:0; padding:0;}
  body{
    background: radial-gradient(circle at 50% -10%, #1a1420 0%, var(--bg) 55%);
    color:var(--text); font-family:'Tajawal', sans-serif; min-height:100vh;
    display:flex; align-items:center; justify-content:center; padding:24px;
  }
  .box{ max-width:420px; width:100%; text-align:center; }
  .logo{ width:88px; height:88px; margin:0 auto 22px; filter: drop-shadow(0 0 22px rgba(0,212,255,0.55)); animation: floaty 3s ease-in-out infinite; }
  @keyframes floaty{ 0%,100%{ transform:translateY(0); } 50%{ transform:translateY(-10px); } }
  .code{
    font-family:'Cairo'; font-weight:900; font-size:72px; line-height:1;
    background: linear-gradient(135deg, var(--neon-blue), var(--neon-purple));
    -webkit-background-clip:text; background-clip:text; color:transparent;
    margin-bottom:8px;
  }
  h1{ font-family:'Cairo'; font-weight:800; font-size:20px; margin-bottom:10px; }
  p{ color:var(--text-dim); font-size:14.5px; line-height:1.8; margin-bottom:28px; }
  .actions{ display:flex; flex-direction:column; gap:10px; }
  .btn{
    display:block; text-decoration:none; padding:14px; border-radius:12px;
    font-family:'Cairo'; font-weight:700; font-size:14.5px; transition:.2s;
  }
  .btn-primary{ background:linear-gradient(135deg, var(--neon-blue), var(--neon-purple)); color:#071013; box-shadow:0 0 20px rgba(0,212,255,0.35); }
  .btn-primary:hover{ opacity:.9; }
  .btn-secondary{ background:var(--card); color:var(--text); border:1px solid var(--hairline); }
  .btn-secondary:hover{ border-color:var(--neon-blue); }
</style>
</head>
<body>
  <div class="box">
    <img src="/assets/logo-icon.svg" class="logo" alt="Digital Syria Store">
    <div class="code">404</div>
    <h1>الصفحة اللي بتدوّر عليها مش موجودة</h1>
    <p>يمكن الرابط تغيّر أو تمت إزالة الصفحة. تأكد من الرابط، أو ارجع للمتجر من الأزرار تحت.</p>
    <div class="actions">
      <a href="index.html" class="btn btn-primary">🏠 العودة للصفحة الرئيسية</a>
      <a href="tournaments.html" class="btn btn-secondary">🏆 تصفح البطولات</a>
    </div>
  </div>
</body>
</html>
