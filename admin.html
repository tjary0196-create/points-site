<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>لوحة التحكم — Digital Syria Store</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;800;900&family=Tajawal:wght@400;500;700&display=swap" rel="stylesheet">
<style>
  :root{
    --bg: #0E0D0F; --bg-soft: #171517; --card: #1C1A1D;
    --gold: #D4A24C; --gold-soft: rgba(212,162,76,0.14);
    --text: #F2EFE9; --text-dim: #ADA9A4;
    --green: #3FA66A; --red: #B4543A; --hairline: rgba(242,239,233,0.08);
  }
  *{box-sizing:border-box; margin:0; padding:0;}
  body{
    background: radial-gradient(circle at 50% -10%, #221c14 0%, var(--bg) 55%);
    color: var(--text); font-family:'Tajawal', sans-serif; min-height:100vh;
  }
  .container{ max-width: 700px; margin: 0 auto; padding: 20px; }
  .topbar{ display:flex; align-items:center; justify-content:space-between; padding:10px 0; }
  .brand{ font-family:'Cairo'; font-weight:900; font-size:20px; color:var(--gold); }
  .stat-grid{ display:grid; grid-template-columns:1fr 1fr; gap:15px; margin-bottom:20px; }
  .stat-card{ background:var(--card); border-radius:16px; padding:20px; border:1px solid var(--hairline); position:relative; overflow:hidden; }
  .stat-card .icon{ font-size:30px; position:absolute; left:15px; top:15px; opacity:0.2; }
  .stat-card .num{ font-family:'Cairo'; font-size:28px; font-weight:900; color:var(--gold); }
  .stat-card .lbl{ font-size:12px; color:var(--text-dim); margin-top:4px; }
  .stat-card.gold{ border-color:var(--gold); background: rgba(212,162,76,0.1); }
  .stat-card.green{ border-color:var(--green); background: rgba(63,166,106,0.1); }
  .stat-card.red{ border-color:var(--red); background: rgba(180,84,58,0.1); }
  #toast{ position:fixed; bottom:20px; left:50%; transform:translateX(-50%); background:var(--gold); color:#1A140A; padding:12px 24px; border-radius:16px; font-weight:bold; box-shadow:0 8px 20px rgba(0,0,0,0.6); opacity:0; transition:0.3s; z-index:100; pointer-events:none; }
  #toast.show{ opacity:1; transform:translateX(-50%) translateY(-10px); }
  #toast.error{ background:var(--red); color:white; }
  .tabs{ display:flex; gap:10px; overflow-x:auto; padding-bottom:10px; }
  .tab{ background:var(--card); border:1px solid var(--hairline); color:var(--text-dim); padding:8px 16px; border-radius:20px; cursor:pointer; white-space:nowrap; }
  .tab.active{ background:var(--gold); color:#1A140A; }
  .panel{ display:none; }
  .panel.active{ display:block; animation:fadeIn 0.3s ease; }
  @keyframes fadeIn{ from{opacity:0; transform:translateY(10px);} to{opacity:1; transform:translateY(0);} }
  .card{ background:var(--card); border:1px solid var(--hairline); border-radius:12px; padding:14px; margin-bottom:10px; }
  .card-row{ display:flex; gap:12px; align-items:flex-start; }
  .card-info .t-name{ font-weight:700; font-size:14px; }
  .card-info .t-meta{ font-size:12px; color:var(--text-dim); }
  .icon-btn{ border:1px solid var(--hairline); background:var(--bg-soft); color:var(--text); border-radius:8px; padding:6px 12px; cursor:pointer; font-size:12px; }
  .icon-btn.success{ color:var(--green); }
  .icon-btn.danger{ color:var(--red); }
  .icon-btn.gold{ color:var(--gold); }
  .primary-btn{ background:linear-gradient(135deg, var(--gold), #b9883e); color:#1A140A; font-weight:bold; border:none; border-radius:12px; padding:10px; width:100%; }
  .empty-state{ text-align:center; color:var(--text-dim); padding:20px; }
  .field{ margin-bottom:12px; }
  .field input, .field textarea{ width:100%; background:var(--bg-soft); border:1px solid var(--hairline); color:var(--text); border-radius:10px; padding:10px; }
  .file-drop{ border:1.5px dashed var(--hairline); border-radius:12px; padding:14px; text-align:center; color:var(--text-dim); cursor:pointer; }
  .file-preview{ margin-top:10px; width:80px; border-radius:8px; overflow:hidden; }
  .file-preview img{ width:100%; display:block; }
  .modal-backdrop{ position:fixed; inset:0; background:rgba(0,0,0,0.6); display:none; align-items:center; justify-content:center; z-index:50; }
  .modal-backdrop.active{ display:flex; }
  .modal{ background:var(--bg); border:1px solid var(--hairline); border-radius:24px; padding:24px; width:90%; max-width:500px; }
</style>
</head>
<body>

<div class="container">
  <div class="topbar">
    <div class="brand">⚡ لوحة الأدمن</div>
    <button onclick="location.reload()" style="background:var(--card); color:var(--red); border:none; padding:8px 16px; border-radius:10px;">خروج</button>
  </div>

  <div class="stat-grid">
    <div class="stat-card gold"><span class="icon">💰</span><div class="num" id="stat-revenue">0</div><div class="lbl">الإيرادات</div></div>
    <div class="stat-card green"><span class="icon">📦</span><div class="num" id="stat-confirmed">0</div><div class="lbl">الطلبات المؤكدة</div></div>
    <div class="stat-card red"><span class="icon">⏳</span><div class="num" id="stat-pending">0</div><div class="lbl">قيد المراجعة</div></div>
    <div class="stat-card"><span class="icon">🛒</span><div class="num" id="stat-products">0</div><div class="lbl">المنتجات</div></div>
  </div>

  <div class="tabs">
    <button class="tab active" data-panel="panel-orders">الطلبات</button>
    <button class="tab" data-panel="panel-products">المنتجات</button>
    <button class="tab" data-panel="panel-topups">طلبات الشحن</button>
    <button class="tab" data-panel="panel-wallet">المحفظة</button>
  </div>

  <!-- Panels will be populated via JS -->
  <div id="panel-orders" class="panel active"><div class="empty-state">جاري تحميل الطلبات...</div></div>
  <div id="panel-products" class="panel"><div class="empty-state">جاري تحميل المنتجات...</div></div>
  <div id="panel-topups" class="panel"><div class="empty-state">جاري تحميل طلبات الشحن...</div></div>
  <div id="panel-wallet" class="panel"><div class="empty-state">جاري تحميل المستخدمين...</div></div>
</div>

<div id="toast">تمت العملية بنجاح</div>

<!-- ===== FIREBASE SCRIPT ===== -->
<script type="module">
  import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
  import { getAuth, GoogleAuthProvider, signInWithPopup, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-auth.js";
  import { getFirestore, collection, doc, getDoc, setDoc, addDoc, updateDoc, deleteDoc, onSnapshot, query, runTransaction } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

  const firebaseConfig = { /* ضع إعداداتك هنا */ };
  const app = initializeApp(firebaseConfig);
  const auth = getAuth(app);
  const db = getFirestore(app);
  const provider = new GoogleAuthProvider();

  function showToast(msg, isError = false) {
    const t = document.getElementById('toast');
    t.textContent = msg;
    t.className = isError ? 'error' : '';
    t.classList.add('show');
    setTimeout(() => t.classList.remove('show'), 4000);
  }

  onAuthStateChanged(auth, async (user) => {
    if (!user) return;
    const adminDoc = await getDoc(doc(db, "admins", user.uid));
    if (!adminDoc.exists()) { alert("غير مصرح"); auth.signOut(); return; }
    // load data...
    listenOrders();
    listenProducts();
    listenTopups();
    listenUsers();
  });

  // (باقي دوال الاستماع والعرض كما هي من ملفك السابق، لكن مع استخدام showToast بدلاً من alert)
</script>
</body>
</html>
