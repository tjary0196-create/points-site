<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Digital Syria Store — شحن ألعاب واشتراكات</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;800;900&family=Tajawal:wght@400;500;700&display=swap" rel="stylesheet">
<style>
  /* (هنا ستضع نفس كود CSS الموجود في ملفك السابق - غيرت عليه فقط بإضافة أنماط قسم الإحالة) */
  :root{
    --bg: #0E0D0F; --bg-soft: #171517; --card: #1C1A1D;
    --gold: #D4A24C; --gold-soft: rgba(212,162,76,0.14);
    --text: #F2EFE9; --text-dim: #ADA9A4;
    --green: #3FA66A; --red: #B4543A; --hairline: rgba(242,239,233,0.08);
  }
  *{box-sizing:border-box; margin:0; padding:0;}
  body{
    background: radial-gradient(circle at 50% -10%, #221c14 0%, var(--bg) 55%);
    color: var(--text); font-family:'Tajawal', sans-serif; min-height:100vh; -webkit-font-smoothing:antialiased;
  }
  /* (باقي الأنماط كما هي، أضفت هذه الزيادة) */
  .ref-section{ margin-top:15px; border-top:1px solid var(--hairline); padding-top:10px; }
  .ref-code-box{ display:flex; gap:8px; align-items:center; margin-bottom:10px; }
  .ref-code-box span.code{ background:var(--bg-soft); padding:6px 12px; border-radius:8px; border:1px solid var(--gold); color:var(--gold); font-weight:bold; letter-spacing:1px; }
  .ref-code-box button{ background:var(--gold); border:none; border-radius:6px; padding:6px 10px; color:#1A140A; font-weight:bold; cursor:pointer; }
  .ref-balance-row{ display:flex; justify-content:space-between; padding:10px 0; border-top:1px solid var(--hairline); }
  .ref-balance-row span{ font-size:13px; color:var(--text-dim); }
  .ref-balance-row b{ color:var(--gold); }
  .withdraw-btn{ width:100%; padding:10px; background:linear-gradient(135deg, var(--gold), #b9883e); color:#1A140A; border:none; border-radius:12px; font-weight:800; font-size:14px; cursor:pointer; margin-top:5px; }
  /* (باقي الأنماط كما هي) */
  .container{ max-width: 480px; margin: 0 auto; padding: 0 18px; }
  /* ... أكمل بقية الأنماط من ملفك السابق ... */
</style>
</head>
<body>
<div id="splash"><div class="coin"></div></div>

<div class="topbar">
  <div class="brand"><span class="coin"></span> Digital Syria Store</div>
  <div class="topbar-actions">
    <div class="balance-pill" id="balance-pill">💰 <span id="balance-amount">0</span> $</div>
    <button class="cart-btn" id="cart-trigger">🛒 <span class="cart-badge" id="cart-count">0</span></button>
    <button class="menu-btn" id="open-sidebar">☰</button>
  </div>
</div>

<!-- Sidebar -->
<div id="sidebar-overlay"></div>
<aside id="sidebar">
  <div class="sidebar-header">
    <span class="brand" style="font-size:15px;">🪙 المتجر</span>
    <button class="sidebar-close" id="close-sidebar">✕</button>
  </div>
  <div class="sidebar-user">
    <div class="user-avatar" id="sidebar-avatar">👤</div>
    <div class="user-info">
      <div class="name" id="sidebar-username">زائر</div>
      <div class="balance">الرصيد: <b id="sidebar-balance">0 $</b></div>
    </div>
  </div>
  <div class="currency-toggle">
    <button class="active" onclick="setCurrency('SYR')">SYR</button>
    <button onclick="setCurrency('USD')">USD</button>
    <button onclick="setCurrency('SYR-Cash')">SYR Cash</button>
  </div>
  <div class="nav-links">
    <a onclick="switchView('view-home')">🏠 الرئيسية</a>
    <a onclick="switchView('view-wallet')">💰 محفظتي</a>
    <a onclick="switchView('view-orders')">📦 طلباتي</a>
    <a href="https://t.me/DigitalSyriaStore" target="_blank" rel="noopener">📢 قناتنا على تلغرام</a>
    <a onclick="document.getElementById('contact-modal-backdrop').classList.add('active')">📞 تواصل معنا</a>
  </div>
  <!-- ===== قسم الإحالة ===== -->
  <div class="ref-section">
    <div style="padding:10px 0; font-size:14px; color:var(--text-dim);">
      <span style="display:block; margin-bottom:6px;">🔗 كود دعوتك:</span>
      <div class="ref-code-box">
        <span class="code" id="my-referral-code">LOADING...</span>
        <button onclick="copyReferral()">نسخ</button>
      </div>
    </div>
    <div class="ref-balance-row">
      <span>💰 رصيدك المعلق (من الإحالات):</span>
      <b id="referral-pending-balance">0 $</b>
    </div>
    <button class="withdraw-btn" id="withdraw-referral-btn">سحب المبلغ</button>
  </div>
</aside>

<!-- (باقي محتوى الصفحة: Login, App, Cart, Checkout, Orders, Wallet, Modals, Bottom Nav, Scripts) -->
<!-- انسخ الباقي من ملفك السابق، لكن تأكد من استبدال الجزء الخاص بـ Firebase والتعديلات التالية -->

<script type="module">
  // ... (استيراد Firebase والتهيئة كما هي) ...
  // أضف هذه الدوال في نهاية الـ script داخل module:

  // دالة الإشعارات
  function showToast(msg, isError = false) {
    const t = document.createElement('div');
    t.style.cssText = `position:fixed; bottom:30px; left:50%; transform:translateX(-50%); background:${isError ? 'var(--red)' : 'var(--gold)'}; color:#1A140A; padding:14px 24px; border-radius:16px; font-weight:bold; box-shadow:0 8px 20px rgba(0,0,0,0.6); z-index:1000; opacity:0; transition:0.3s;`;
    t.textContent = msg;
    document.body.appendChild(t);
    requestAnimationFrame(() => t.style.opacity = '1');
    setTimeout(() => { t.style.opacity = '0'; setTimeout(() => t.remove(), 300); }, 4000);
  }

  // === نظام الإحالة ===
  const userRef = doc(db, "users", currentUser.uid);
  onSnapshot(userRef, (snap) => {
    const data = snap.data();
    if (data) {
      document.getElementById('my-referral-code').textContent = data.referralCode || "جاري التحميل...";
      document.getElementById('referral-pending-balance').textContent = (data.pendingReward || 0).toFixed(2) + " $";
    }
  });

  // نسخ كود الدعوة
  window.copyReferral = function() {
    const code = document.getElementById('my-referral-code').textContent;
    navigator.clipboard.writeText(`https://points-site.vercel.app/?ref=${code}`);
    showToast("تم نسخ رابط الدعوة!");
  }

  // زر السحب - يستدعي Cloud Function
  document.getElementById('withdraw-referral-btn').addEventListener('click', async () => {
    if (confirm("هل أنت متأكد من سحب الرصيد المعلق إلى محفظتك؟")) {
      showToast("جاري معالجة السحب...");
      // استدعاء الدالة السحابية
      try {
        const withdrawFunction = httpsCallable(functions, 'withdrawReferral');
        const result = await withdrawFunction();
        showToast(result.data.message);
      } catch (err) {
        showToast("خطأ: " + err.message, true);
      }
    }
  });
</script>
</body>
</html>
